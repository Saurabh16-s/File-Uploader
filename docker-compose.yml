version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: img_db
    restart: no
    env_file:
      - .env
    environment:
      POSTGRES_DB: Uploader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres -c listen_addresses='*'
               -c max_connections=200

  backend:
    build: .
    container_name: img_upload
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    env_file:
      - .env   # ✅ AWS + others
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Uploader?sslmode=disable
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      PORT: ${PORT}   # ✅ dynamic

volumes:
  pgdata: